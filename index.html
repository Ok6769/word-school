<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dis Donc! – Französisch lernen</title>

<style>

*{box-sizing:border-box;}

body{
    margin:0;
    padding:20px;
    font-family:Arial,sans-serif;
    background:#fff8f1;
    min-height:100vh;
    overflow-x:hidden;
    position:relative;
}

body::before{
    content:"";
    position:fixed;
    width:400px;
    height:400px;
    border-radius:50%;
    background:#ff8c1a;
    top:-180px;
    left:-180px;
    opacity:0.25;
    z-index:-1;
}

body::after{
    content:"";
    position:fixed;
    width:500px;
    height:500px;
    border-radius:50%;
    background:#ff8c1a;
    bottom:-250px;
    right:-250px;
    opacity:0.25;
    z-index:-1;
}

.container{
    max-width:800px;
    margin:40px auto;
    background:white;
    border-radius:25px;
    padding:35px;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

h1{color:#ff7a00;margin-bottom:10px;}

.subtitle{color:#666;margin-bottom:30px;}

.progress-text{font-size:18px;margin-bottom:10px;color:#555;}

.progress-bar{
    width:100%;
    height:18px;
    background:#eee;
    border-radius:50px;
    overflow:hidden;
    margin-bottom:30px;
}

.progress-fill{
    height:100%;
    width:0%;
    background:#ff8c1a;
    transition:0.3s;
}

#word{
    font-size:36px;
    margin:30px 0;
    color:#333;
}

.answer-btn{
    width:100%;
    padding:16px;
    margin:10px 0;
    border:none;
    border-radius:15px;
    font-size:18px;
    cursor:pointer;
    background:#ff8c1a;
    color:white;
    transition:0.2s;
}

.answer-btn:hover{transform:scale(1.02);background:#ff7700;}

.correct{background:#2ecc71 !important;}
.wrong{background:#e74c3c !important;}

.input-box{
    width:100%;
    padding:16px;
    font-size:18px;
    border-radius:12px;
    border:2px solid #ddd;
    margin-top:10px;
    outline:none;
}

.input-box:focus{border-color:#ff8c1a;}

.restart-btn{
    background:#ff8c1a;
    color:white;
    border:none;
    border-radius:15px;
    padding:16px 25px;
    font-size:20px;
    cursor:pointer;
}

.restart-btn:hover{background:#ff7700;}

</style>
</head>

<body>

<div class="container">

<h1>🇫🇷 Dis Donc!</h1>

<div class="subtitle">Französische Wörter lernen</div>

<div class="progress-text" id="progressText">Frage 1 von 20</div>

<div class="progress-bar">
<div class="progress-fill" id="progressFill"></div>
</div>

<div id="word"></div>

<div id="answers"></div>

<div id="result"></div>

<div class="score-box">
Punkte: <span id="score">0</span>
</div>

</div>

<script>

const questions = [
["das Kino","le cinéma"],
["eine Spinne","une araignée"],
["ein Feind","un ennemi"],
["flink","agile"],
["zuverlässig","fiable"],
["der Ritter","le chevalier"],
["mutig","courageux"],
["der Mut","le courage"],
["ehrlich","honnête"],
["grausam","cruel"],
["böse","méchant"],
["die Hexe","la sorcière"],
["eifersüchtig","jaloux"],
["der Vampir","le vampire"],
["unsterblich","immortel"],
["ehrgeizig","ambitieux"],
["der Held","le héros"],
["riesig","géant"],
["schön","beau"],
["gewalttätig","violent"]
];

questions.sort(() => Math.random() - 0.5);

let current = 0;
let score = 0;
let mode = 1;
const MAX = 20;

function updateProgress(){
document.getElementById("progressFill").style.width =
(current / MAX) * 100 + "%";

document.getElementById("progressText").textContent =
`Frage ${current + 1} von ${MAX}`;
}

function loadQuestion(){

updateProgress();
document.getElementById("result").textContent = "";

const [de, fr] = questions[current];
const word = mode === 1 ? de : fr;
const correct = mode === 1 ? fr : de;

document.getElementById("word").textContent = word;

const answers = document.getElementById("answers");
answers.innerHTML = "";

/* MODE 1 - BUTTONS */
if(mode === 1){

let options = [correct];

while(options.length < 4){
let r = questions[Math.floor(Math.random()*questions.length)][1];
if(!options.includes(r)) options.push(r);
}

options.sort(() => Math.random() - 0.5);

options.forEach(opt => {

const btn = document.createElement("button");
btn.className = "answer-btn";
btn.textContent = opt;

btn.onclick = () => {

document.querySelectorAll(".answer-btn")
.forEach(b => b.disabled = true);

if(opt === correct){
btn.classList.add("correct");
document.getElementById("result").textContent = "✅ Richtig!";
score++;
} else {
btn.classList.add("wrong");
document.querySelectorAll(".answer-btn").forEach(b=>{
if(b.textContent === correct) b.classList.add("correct");
});
document.getElementById("result").textContent = "❌ Falsch!";
}

document.getElementById("score").textContent = score;
current++;

setTimeout(()=>{
if(current < MAX) loadQuestion();
else showContinue();
},1200);

};

answers.appendChild(btn);
});

}

/* MODE 2 - INPUT */
else{

const input = document.createElement("input");
input.className = "input-box";
input.placeholder = "Schreibe die Übersetzung...";

const btn = document.createElement("button");
btn.className = "answer-btn";
btn.textContent = "Prüfen";

function check(){

const val = input.value.trim().toLowerCase();

document.querySelectorAll(".answer-btn")
.forEach(b => b.disabled = true);

if(val === correct.toLowerCase()){
input.style.border = "2px solid #2ecc71";
document.getElementById("result").textContent = "✅ Richtig!";
score++;
} else {
input.style.border = "2px solid #e74c3c";
document.getElementById("result").textContent =
"❌ Falsch! Richtig: " + correct;
}

document.getElementById("score").textContent = score;
current++;

setTimeout(()=>{
if(current < MAX) loadQuestion();
else finish();
},1200);
}

btn.onclick = check;
input.addEventListener("keydown",e=>{
if(e.key==="Enter") check();
});

answers.appendChild(input);
answers.appendChild(btn);
input.focus();
}

}

/* CONTINUE SCREEN */
function showContinue(){
document.querySelector(".container").innerHTML = `
<h1>🔥 Teil 1 fertig!</h1>
<p>Jetzt kommt Teil 2 (Eingabe)</p>

<button class="restart-btn" onclick="start2()">
Weiter ▶
</button>
`;
}

/* START PART 2 */
function start2(){

current = 0;
mode = 2;

document.querySelector(".container").innerHTML = `
<h1>🇫🇷 Dis Donc!</h1>

<div class="subtitle">Teil 2: Eingabe</div>

<div class="progress-text" id="progressText"></div>

<div class="progress-bar">
<div class="progress-fill" id="progressFill"></div>
</div>

<div id="word"></div>
<div id="answers"></div>
<div id="result"></div>

<div class="score-box">
Punkte: <span id="score">${score}</span>
</div>
`;

loadQuestion();
}

/* FINISH */
function finish(){

const percent = Math.round(score/(MAX*2)*100);

let msg =
percent>=90?"🏆 Fantastisch!":
percent>=70?"🥈 Sehr gut!":
percent>=50?"👍 Gut!":"📚 Weiter üben!";

document.querySelector(".container").innerHTML = `
<h1>🎉 Fertig!</h1>
<h2>${msg}</h2>
<h1>${score}/${MAX*2}</h1>
<p>${percent}% richtig</p>

<button class="restart-btn" onclick="location.reload()">
Neu starten 🔄
</button>
`;
}

loadQuestion();

</script>

</body>
</html>
