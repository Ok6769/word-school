<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dis Donc! – Französisch lernen</title>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    padding:20px;
    font-family:Arial,sans-serif;
    background:#fff8f1;
    min-height:100vh;
    overflow-x:hidden;
    position:relative;
}

/* Оранжевые круги как в учебнике */

body::before{
    content:"";
    position:fixed;
    width:400px;
    height:400px;
    border-radius:50%;
    background:#ff8c1a;
    top:-180px;
    left:-180px;
    opacity:0.25;
    z-index:-1;
}

body::after{
    content:"";
    position:fixed;
    width:500px;
    height:500px;
    border-radius:50%;
    background:#ff8c1a;
    bottom:-250px;
    right:-250px;
    opacity:0.25;
    z-index:-1;
}

.container{
    max-width:800px;
    margin:40px auto;
    background:white;
    border-radius:25px;
    padding:35px;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

h1{
    color:#ff7a00;
    margin-bottom:10px;
}

.subtitle{
    color:#666;
    margin-bottom:30px;
}

.progress-text{
    font-size:18px;
    margin-bottom:10px;
    color:#555;
}

.progress-bar{
    width:100%;
    height:18px;
    background:#eee;
    border-radius:50px;
    overflow:hidden;
    margin-bottom:30px;
}

.progress-fill{
    height:100%;
    width:0%;
    background:#ff8c1a;
    transition:0.3s;
}

#word{
    font-size:36px;
    margin:30px 0;
    color:#333;
}

.answer-btn{
    width:100%;
    padding:16px;
    margin:10px 0;
    border:none;
    border-radius:15px;
    font-size:18px;
    cursor:pointer;
    background:#ff8c1a;
    color:white;
    transition:0.2s;
}

.answer-btn:hover{
    transform:scale(1.02);
    background:#ff7700;
}

.correct{
    background:#2ecc71 !important;
}

.wrong{
    background:#e74c3c !important;
}

#result{
    min-height:35px;
    font-size:24px;
    margin-top:20px;
}

.score-box{
    margin-top:20px;
    font-size:20px;
}

#score{
    color:#ff7a00;
    font-weight:bold;
}

.restart-btn{
    background:#ff8c1a;
    color:white;
    border:none;
    border-radius:15px;
    padding:16px 25px;
    font-size:20px;
    cursor:pointer;
}

.restart-btn:hover{
    background:#ff7700;
}

</style>
</head>

<body>

<div class="container">

<h1>🇫🇷 Dis Donc!</h1>

<div class="subtitle">
Französische Wörter lernen
</div>

<div class="progress-text" id="progressText">
Frage 1 von 20
</div>

<div class="progress-bar">
<div class="progress-fill" id="progressFill"></div>
</div>

<div id="word"></div>

<div id="answers"></div>

<div id="result"></div>

<div class="score-box">
Punkte: <span id="score">0</span>
</div>

</div>

<script>

const questions = [

["das Kino","le cinéma"],
["eine Spinne","une araignée"],
["ein Feind","un ennemi"],
["flink","agile"],
["zuverlässig","fiable"],
["der Ritter","le chevalier"],
["mutig","courageux"],
["der Mut","le courage"],
["ehrlich","honnête"],
["grausam","cruel"],
["böse","méchant"],
["die Hexe","la sorcière"],
["eifersüchtig","jaloux"],
["der Vampir","le vampire"],
["unsterblich","immortel"],
["ehrgeizig","ambitieux"],
["der Held","le héros"],
["riesig","géant"],
["schön","beau"],
["gewalttätig","violent"]

];

questions.sort(() => Math.random() - 0.5);

let current = 0;
let score = 0;

function updateProgress(){

const percent =
(current / questions.length) * 100;

document.getElementById("progressFill")
.style.width = percent + "%";

document.getElementById("progressText")
.textContent =
`Frage ${current + 1} von ${questions.length}`;

}

function loadQuestion(){

updateProgress();

document.getElementById("result").textContent = "";

const word = questions[current][0];
const correct = questions[current][1];

document.getElementById("word").textContent = word;

let options = [correct];

while(options.length < 4){

let randomAnswer =
questions[
Math.floor(Math.random()*questions.length)
][1];

if(!options.includes(randomAnswer)){
options.push(randomAnswer);
}

}

options.sort(() => Math.random() - 0.5);

const answersDiv =
document.getElementById("answers");

answersDiv.innerHTML = "";

options.forEach(option => {

const btn =
document.createElement("button");

btn.className = "answer-btn";

btn.textContent = option;

btn.onclick = () => {

const buttons =
document.querySelectorAll(".answer-btn");

buttons.forEach(b => b.disabled = true);

if(option === correct){

btn.classList.add("correct");

document.getElementById("result")
.textContent = "✅ Richtig!";

score++;

}
else{

btn.classList.add("wrong");

buttons.forEach(b => {

if(b.textContent === correct){

b.classList.add("correct");

}

});

document.getElementById("result")
.textContent = "❌ Falsch!";

}

document.getElementById("score")
.textContent = score;

current++;

setTimeout(() => {

if(current < questions.length){

loadQuestion();

}
else{

finishQuiz();

}

},1500);

};

answersDiv.appendChild(btn);

});

}

function finishQuiz(){

let message = "";

const percent =
Math.round(score/questions.length*100);

if(percent >= 90){

message = "🏆 Fantastisch!";

}
else if(percent >= 70){

message = "🥈 Sehr gut!";

}
else if(percent >= 50){

message = "👍 Gut gemacht!";

}
else{

message = "📚 Weiter üben!";

}

document.querySelector(".container").innerHTML = `

<h1>🎉 Test beendet!</h1>

<h2>${message}</h2>

<h1>${score}/${questions.length}</h1>

<p>${percent}% richtig</p>

<button class="restart-btn"
onclick="location.reload()">
🔄 Neu starten
</button>

`;

}

loadQuestion();

</script>

</body>
</html>
