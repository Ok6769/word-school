<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dis Donc! – Französisch lernen</title>

<style>

*{box-sizing:border-box;}

body{
    margin:0;
    padding:20px;
    font-family:Arial,sans-serif;
    background:#fff8f1;
    min-height:100vh;
    overflow-x:hidden;
    position:relative;
}

body::before{
    content:"";
    position:fixed;
    width:400px;
    height:400px;
    border-radius:50%;
    background:#ff8c1a;
    top:-180px;
    left:-180px;
    opacity:0.25;
    z-index:-1;
}

body::after{
    content:"";
    position:fixed;
    width:500px;
    height:500px;
    border-radius:50%;
    background:#ff8c1a;
    bottom:-250px;
    right:-250px;
    opacity:0.25;
    z-index:-1;
}

.container{
    max-width:800px;
    margin:40px auto;
    background:white;
    border-radius:25px;
    padding:35px;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
    /* Новая анимация плавного появления всего контейнера */
    animation: fadeInUp 0.6s ease-out both;
}

h1{color:#ff7a00;margin-bottom:10px;}

.subtitle{color:#666;margin-bottom:30px;}

.progress-text{font-size:18px;margin-bottom:10px;color:#555;}

.progress-bar{
    width:100%;
    height:18px;
    background:#eee;
    border-radius:50px;
    overflow:hidden;
    margin-bottom:30px;
    position: relative;
}

.progress-fill{
    height:100%;
    width:0%;
    background:#ff8c1a;
    /* Плавное изменение ширины + анимация перелива */
    transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    background-image: linear-gradient(45deg, rgba(255,255,255,0.15) 25%, transparent 25%, transparent 50%, rgba(255,255,255,0.15) 50%, rgba(255,255,255,0.15) 75%, transparent 75%, transparent);
    background-size: 40px 40px;
    animation: progressMoving 2s linear infinite;
}

#word{
    font-size:36px;
    margin:30px 0;
    color:#333;
    /* Анимация появления нового слова */
    animation: fadeIn 0.4s ease-out;
}

.answer-btn{
    width:100%;
    padding:16px;
    margin:10px 0;
    border:none;
    border-radius:15px;
    font-size:18px;
    cursor:pointer;
    background:#ff8c1a;
    color:white;
    /* Улучшенный плавный переход для ховера и цвета */
    transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), background-color 0.3s, box-shadow 0.2s;
}

.answer-btn:hover{
    transform: translateY(-2px);
    background:#ff7700;
    box-shadow: 0 5px 15px rgba(255, 122, 0, 0.3);
}

.answer-btn:active {
    transform: translateY(0);
}

.correct{
    background:#2ecc71 !important;
    box-shadow: 0 5px 15px rgba(46, 204, 113, 0.4) !important;
}
.wrong{
    background:#e74c3c !important;
    box-shadow: 0 5px 15px rgba(231, 76, 60, 0.4) !important;
}

.input-box{
    width:100%;
    padding:16px;
    font-size:18px;
    border-radius:12px;
    border:2px solid #ddd;
    margin-top:10px;
    outline:none;
    /* Плавный переход для рамки ввода */
    transition: border-color 0.3s, box-shadow 0.3s;
}

.input-box:focus{
    border-color:#ff8c1a;
    box-shadow: 0 0 8px rgba(255, 140, 26, 0.2);
}

.warning{
    font-size:16px;
    color:#ff7a00;
    margin:10px 0;
}

.restart-btn{
    background:#ff8c1a;
    color:white;
    border:none;
    border-radius:15px;
    padding:16px 25px;
    font-size:20px;
    cursor:pointer;
    transition: transform 0.2s, background-color 0.2s, box-shadow 0.2s;
}

.restart-btn:hover{
    background:#ff7700;
    transform: scale(1.05);
    box-shadow: 0 5px 15px rgba(255, 122, 0, 0.3);
}

/* Стили для французской виртуальной клавиатуры */
.french-keyboard {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 15px;
    margin-bottom: 5px;
    animation: fadeIn 0.4s ease-out;
}

.char-btn {
    background: #f0f0f0;
    border: 1px solid #ccc;
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 16px;
    cursor: pointer;
    color: #333;
    transition: all 0.15s ease;
    min-width: 38px;
    text-align: center;
}

.char-btn:hover {
    background: #ff8c1a;
    color: white;
    border-color: #ff8c1a;
    transform: translateY(-1px);
}

.char-btn:active {
    transform: translateY(0);
}

.score-box {
    margin-top: 20px;
    font-size: 16px;
    color: #666;
}

/* Описание анимаций */
@keyframes fadeInUp {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

@keyframes progressMoving {
    from { background-position: 0 0; }
    to { background-position: 40px 0; }
}

</style>
</head>

<body>

<div class="container">

<h1>🇫🇷 Dis Donc!</h1>

<div class="subtitle">Französische Wörter lernen</div>

<div class="progress-text" id="progressText">Frage 1 von 20</div>

<div class="progress-bar">
<div class="progress-fill" id="progressFill"></div>
</div>

<div id="word"></div>

<div id="answers"></div>

<div id="result"></div>

<div class="score-box">
Punkte: <span id="score">0</span>
</div>

</div>

<script>

const questions = [
["das Kino","le cinéma"],
["die Spinne","une araignée"],
["der Feind","un ennemi"],
["flink","agile"],
["zuverlässig","fiable"],
["der Ritter","le chevalier"],
["mutig","courageux"],
["der Mut","le courage"],
["ehrlich","honnête"],
["grausam","cruel"],
["böse","méchant"],
["die Hexe","la sorcière"],
["eifersüchtig","jaloux"],
["der Vampir","le vampire"],
["unsterblich","immortel"],
["ehrgeizig","ambitieux"],
["der Held","le héros"],
["riesig","géant"],
["schön","beau"],
["gewalttätig","violent"]
];

questions.sort(() => Math.random() - 0.5);

let current = 0;
let score = 0;
let mode = 1; 
const MAX = 20;

/* progress */
function updateProgress(){
document.getElementById("progressFill").style.width =
(current / MAX) * 100 + "%";

document.getElementById("progressText").textContent =
`Frage ${current + 1} von ${MAX}`;
}

/* load question */
function loadQuestion(){

updateProgress();
document.getElementById("result").textContent = "";

const [de, fr] = questions[current];

const word = (mode === 1 || mode === 3) ? de : fr;
const correct = (mode === 1 || mode === 3) ? fr : de;

document.getElementById("word").textContent = word;

const answers = document.getElementById("answers");
answers.innerHTML = "";

/* MODE 1 */
if(mode === 1){

let options = [correct];

while(options.length < 4){
let r = questions[Math.floor(Math.random()*questions.length)][1];
if(!options.includes(r)) options.push(r);
}

options.sort(() => Math.random() - 0.5);

options.forEach(opt => {

const btn = document.createElement("button");
btn.className = "answer-btn";
btn.textContent = opt;

btn.onclick = () => {

document.querySelectorAll(".answer-btn")
.forEach(b => b.disabled = true);

if(opt === correct){
btn.classList.add("correct");
document.getElementById("result").textContent = "✅ Richtig!";
score++;
} else {
btn.classList.add("wrong");
document.querySelectorAll(".answer-btn").forEach(b=>{
if(b.textContent === correct) b.classList.add("correct");
});
document.getElementById("result").textContent = "❌ Falsch!";
}

document.getElementById("score").textContent = score;
current++;

setTimeout(()=>{
if(current < MAX) loadQuestion();
else showContinue(2); 
},1200);

};

answers.appendChild(btn);
});

}

/* MODE 2 & MODE 3 INPUT */
else {

const input = document.createElement("input");
input.className = "input-box";
input.placeholder = "Schreibe die Übersetzung...";

const btn = document.createElement("button");
btn.className = "answer-btn";
btn.textContent = "Prüfen";

/* clean function */
function clean(text, currentMode){
if (currentMode === 2) {
    let cleared = text.replace(/\b(der|die|das)\b/gi, "").replace(/\s+/g," ").trim();
    if(cleared.length > 0) {
        cleared = cleared.charAt(0).toUpperCase() + cleared.slice(1);
    }
    return cleared;
} else {
    return text.toLowerCase().trim();
}
}

function check(){
const user = clean(input.value, mode);
const correctClean = clean(correct, mode);

document.querySelectorAll(".answer-btn")
.forEach(b => b.disabled = true);

if(user === correctClean){
input.style.border = "2px solid #2ecc71";
input.style.boxShadow = "0 0 10px rgba(46, 204, 113, 0.3)";
document.getElementById("result").textContent = "✅ Richtig!";
score++;
} else {
input.style.border = "2px solid #e74c3c";
input.style.boxShadow = "0 0 10px rgba(231, 76, 60, 0.3)";
document.getElementById("result").textContent =
"❌ Falsch! Richtig: " + correct;
}

document.getElementById("score").textContent = score;
current++;

setTimeout(()=>{
if(current < MAX) loadQuestion();
else {
    if(mode === 2) showContinue(3); 
    else finish(); 
}
},1200);
}

btn.onclick = check;

input.addEventListener("keydown",e=>{
if(e.key==="Enter") check();
});

/* ДОБАВЛЕНИЕ КНОПОК ФРАНЦУЗСКИХ БУКВ ДЛЯ ЭТАПА 3 */
if(mode === 3) {
    const keyboardContainer = document.createElement("div");
    keyboardContainer.className = "french-keyboard";
    
    // Список необходимых французских символов
    const frenchChars = ["é", "è", "à", "ç", "ù", "â", "ê", "î", "ô", "û", "ë", "ï"];
    
    frenchChars.forEach(char => {
        const charBtn = document.createElement("button");
        charBtn.className = "char-btn";
        charBtn.type = "button";
        charBtn.textContent = char;
        
        charBtn.onclick = (e) => {
            e.preventDefault(); // Чтобы не терялся фокус с инпута
            
            // Вставляем символ в позицию курсора внутри инпута
            const startPos = input.selectionStart;
            const endPos = input.selectionEnd;
            const text = input.value;
            
            input.value = text.substring(0, startPos) + char + text.substring(endPos);
            
            // Возвращаем курсор на место сразу после вставленной буквы
            input.selectionStart = input.selectionEnd = startPos + 1;
            input.focus();
        };
        
        keyboardContainer.appendChild(charBtn);
    });
    
    // Добавляем клавиатуру ПЕРЕД инпутом
    answers.appendChild(keyboardContainer);
}

answers.appendChild(input);
answers.appendChild(btn);

input.focus();

}

}

/* CONTINUE */
function showContinue(nextMode){
let title = "";
let subtitle = "";
let btnClick = "";

if(nextMode === 2) {
    title = "🔥 Teil 1 fertig!";
    subtitle = "Jetzt kommt Teil 2 (Eingabe auf Deutsch)";
    btnClick = "start2()";
} else if(nextMode === 3) {
    title = "🔥 Teil 2 fertig!";
    subtitle = "Jetzt kommt Teil 3 (Eingabe auf Französisch)";
    btnClick = "start3()";
}

document.querySelector(".container").innerHTML = `
<h1>${title}</h1>
<p>${subtitle}</p>

<button class="restart-btn" onclick="${btnClick}">
Weiter ▶
</button>
`;
}

/* START 2 */
function start2(){
current = 0;
mode = 2;

document.querySelector(".container").innerHTML = `
<h1>🇫🇷 Dis Donc!</h1>

<div class="subtitle">Teil 2: Eingabe auf Deutsch</div>

<div class="progress-text" id="progressText"></div>

<div class="progress-bar">
<div class="progress-fill" id="progressFill"></div>
</div>

<div id="word"></div>
<div id="answers"></div>
<div id="result"></div>

<div class="score-box">
Punkte: <span id="score">${score}</span>
</div>
`;

loadQuestion();
}

/* START 3 */
function start3(){
current = 0;
mode = 3;

document.querySelector(".container").innerHTML = `
<h1>🇫🇷 Dis Donc!</h1>

<div class="subtitle">Teil 3: Eingabe auf Französisch</div>

<div class="progress-text" id="progressText"></div>

<div class="progress-bar">
<div class="progress-fill" id="progressFill"></div>
</div>

<div id="word"></div>
<div id="answers"></div>
<div id="result"></div>

<div class="score-box">
Punkte: <span id="score">${score}</span>
</div>
`;

loadQuestion();
}

/* FINISH */
function finish(){
const percent = Math.round(score/(MAX*3)*100);

let msg =
percent>=90?"🏆 Fantastisch!":
percent>=70?"🥈 Sehr gut!":
percent>=50?"👍 Gut!":"📚 Weiter üben!";

document.querySelector(".container").innerHTML = `
<h1>🎉 Fertig!</h1>

<h2>${msg}</h2>

<h1>${score}/${MAX*3}</h1>

<p>${percent}% richtig</p>

<button class="restart-btn" onclick="location.reload()">
Neu starten 🔄
</button>
`;
}

loadQuestion();

</script>

</body>
</html>
