<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Französisch lernen</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f4f4;
    text-align:center;
    padding:20px;
}

.container{
    max-width:700px;
    margin:auto;
    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

h1{
    color:#2c3e50;
}

#word{
    font-size:32px;
    margin:30px 0;
}

button{
    width:100%;
    padding:15px;
    margin:10px 0;
    font-size:18px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:#3498db;
    color:white;
}

button:hover{
    background:#2980b9;
}

#result{
    font-size:24px;
    min-height:30px;
    margin-top:15px;
}

#score{
    font-weight:bold;
}
</style>
</head>
<body>

<div class="container">

<h1>🇫🇷 Französisch lernen</h1>

<h2 id="word"></h2>

<div id="answers"></div>

<p id="result"></p>

<p>Punkte: <span id="score">0</span></p>

</div>

<script>

const questions = [
["das Kino","le cinéma"],
["eine Spinne","une araignée"],
["ein Feind","un ennemi"],
["flink","agile"],
["zuverlässig","fiable"],
["der Ritter","le chevalier"],
["mutig","courageux"],
["der Mut","le courage"],
["ehrlich","honnête"],
["grausam","cruel"],
["böse","méchant"],
["die Hexe","la sorcière"],
["eifersüchtig","jaloux"],
["der Vampir","le vampire"],
["unsterblich","immortel"],
["ehrgeizig","ambitieux"],
["der Held","le héros"],
["riesig","géant"],
["schön","beau"],
["gewalttätig","violent"]
];

questions.sort(() => Math.random() - 0.5);

let current = 0;
let score = 0;

function loadQuestion(){

document.getElementById("result").textContent = "";

const word = questions[current][0];
const correct = questions[current][1];

document.getElementById("word").textContent = word;

let options = [correct];

while(options.length < 3){
let random =
questions[Math.floor(Math.random()*questions.length)][1];

if(!options.includes(random)){
options.push(random);
}
}

options.sort(() => Math.random() - 0.5);

const answersDiv = document.getElementById("answers");
answersDiv.innerHTML = "";

options.forEach(option => {

const btn = document.createElement("button");

btn.textContent = option;

btn.onclick = () => {

if(option === correct){
score++;
document.getElementById("result").textContent =
"✅ Richtig!";
}
else{
document.getElementById("result").textContent =
"❌ Falsch!";
}

document.getElementById("score").textContent = score;

current++;

setTimeout(() => {

if(current < questions.length){
loadQuestion();
}
else{
finishQuiz();
}

},1000);

};

answersDiv.appendChild(btn);

});

}

function finishQuiz(){

document.querySelector(".container").innerHTML = `
<h1>🎉 Test beendet!</h1>

<h2>Dein Ergebnis:</h2>

<h1>${score}/${questions.length}</h1>

<button onclick="location.reload()">
🔄 Neu starten
</button>
`;

}

loadQuestion();

</script>

</body>
</html>
