<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dis Donc! – Französisch U6 lernen</title>
<style>
*{box-sizing:border-box;}
body{margin:0;padding:20px;font-family:Arial,sans-serif;background:#fff8f1;min-height:100vh;overflow-x:hidden;position:relative;}
body::before{content:"";position:fixed;width:400px;height:400px;border-radius:50%;background:#ff8c1a;top:-180px;left:-180px;opacity:.25;z-index:-1;}
body::after{content:"";position:fixed;width:500px;height:500px;border-radius:50%;background:#ff8c1a;bottom:-250px;right:-250px;opacity:.25;z-index:-1;}
.container{max-width:800px;margin:40px auto;background:white;border-radius:25px;padding:35px;box-shadow:0 10px 30px rgba(0,0,0,.1);}
h1{color:#ff7a00}
.subtitle{color:#666;margin-bottom:30px}
.progress-text{font-size:18px;margin-bottom:10px;color:#555}
.progress-bar{width:100%;height:18px;background:#eee;border-radius:50px;overflow:hidden;margin-bottom:30px}
.progress-fill{height:100%;width:0%;background:#ff8c1a;transition:.3s}
#word{font-size:36px;margin:30px 0;color:#333}
.answer-btn,.restart-btn{width:100%;padding:16px;margin:10px 0;border:none;border-radius:15px;font-size:18px;cursor:pointer;background:#ff8c1a;color:white}
.answer-btn:hover,.restart-btn:hover{background:#ff7700}
.correct{background:#2ecc71!important}
.wrong{background:#e74c3c!important}
.input-box{width:100%;padding:16px;font-size:18px;border-radius:12px;border:2px solid #ddd;margin-top:10px}
.warning{font-size:16px;color:#ff7a00;margin:10px 0}
</style>
</head>
<body>
<div class="container">
<h1>🇫🇷 Dis Donc!</h1>
<div class="subtitle">Französische Wörter lernen</div>
<div class="progress-text" id="progressText"></div>
<div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
<div id="word"></div>
<div id="answers"></div>
<div id="result"></div>
<div>Punkte: <span id="score">0</span></div>
</div>

<script>
const questions=[
["das Kino","le cinéma"],["eine Spinne","une araignée"],["ein Feind","un ennemi"],
["flink","agile"],["zuverlässig","fiable"],["der Ritter","le chevalier"],
["mutig","courageux"],["der Mut","le courage"],["ehrlich","honnête"],
["grausam","cruel"],["böse","méchant"],["die Hexe","la sorcière"],
["eifersüchtig","jaloux"],["der Vampir","le vampire"],["unsterblich","immortel"],
["ehrgeizig","ambitieux"],["der Held","le héros"],["riesig","géant"],
["schön","beau"],["gewalttätig","violent"]
];

questions.sort(()=>Math.random()-0.5);

let current=0,score=0,mode=1;
let mistakes=[];
let reviewMode=false;
let reviewQuestions=[];
const MAX=questions.length;

function clean(t){
 return t.toLowerCase()
 .replace(/\b(der|die|das|den|dem|des|ein|eine|einen|einem|einer)\b/g,"")
 .replace(/\s+/g," ").trim();
}

function sourceList(){ return reviewMode?reviewQuestions:questions; }

function updateProgress(){
 const total=reviewMode?reviewQuestions.length:MAX;
 document.getElementById("progressFill").style.width=(current/total*100)+"%";
 document.getElementById("progressText").textContent=(reviewMode?"Fehler ":"Frage ")+(current+1)+" von "+total;
}

function loadQuestion(){
 updateProgress();
 document.getElementById("result").textContent="";
 const [de,fr]=sourceList()[current];
 const word=mode===1?de:fr;
 const correct=mode===1?fr:de;

 document.getElementById("word").textContent=word;
 const answers=document.getElementById("answers");
 answers.innerHTML="";

 if(mode===1 && !reviewMode){
   let options=[correct];
   while(options.length<4){
     let r=questions[Math.floor(Math.random()*questions.length)][1];
     if(!options.includes(r)) options.push(r);
   }
   options.sort(()=>Math.random()-0.5);

   options.forEach(opt=>{
     const btn=document.createElement("button");
     btn.className="answer-btn";
     btn.textContent=opt;
     btn.onclick=()=>{
       document.querySelectorAll(".answer-btn").forEach(b=>b.disabled=true);
       if(opt===correct){ score++; btn.classList.add("correct"); }
       else { btn.classList.add("wrong"); mistakes.push([de,fr]); }
       document.getElementById("score").textContent=score;
       current++;
       setTimeout(()=> current<MAX ? loadQuestion() : showContinue(),1000);
     };
     answers.appendChild(btn);
   });
 } else {
   const warning=document.createElement("div");
   warning.className="warning";
   warning.textContent="⚠️ Keine Artikel eingeben (der / die / das)";
   const input=document.createElement("input");
   input.className="input-box";

   const btn=document.createElement("button");
   btn.className="answer-btn";
   btn.textContent="Prüfen";

   function check(){
      if(clean(input.value)===clean(correct)){
         score++;
         input.style.border="2px solid #2ecc71";
      } else {
         input.style.border="2px solid #e74c3c";
         if(!reviewMode) mistakes.push([de,fr]);
         document.getElementById("result").textContent="❌ Richtig: "+correct;
      }
      document.getElementById("score").textContent=score;
      current++;
      setTimeout(()=>{
        const total=reviewMode?reviewQuestions.length:MAX;
        if(current<total) loadQuestion();
        else reviewMode?finishReview():finish();
      },1200);
   }

   btn.onclick=check;
   input.addEventListener("keydown",e=>{if(e.key==="Enter")check();});
   answers.append(warning,input,btn);
   input.focus();
 }
}

function showContinue(){
 document.querySelector(".container").innerHTML=`
 <h1>🔥 Teil 1 fertig!</h1>
 <p>Jetzt kommt Teil 2 (Eingabe)</p>
 <button class="restart-btn" onclick="start2()">Weiter ▶</button>`;
}

function start2(){
 current=0; mode=2;
 document.querySelector(".container").innerHTML=`
 <h1>🇫🇷 Dis Donc!</h1>
 <div class="subtitle">Teil 2: Eingabe</div>
 <div class="progress-text" id="progressText"></div>
 <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
 <div id="word"></div><div id="answers"></div><div id="result"></div>
 <div>Punkte: <span id="score">${score}</span></div>`;
 loadQuestion();
}

function finish(){
 const percent=Math.round(score/(MAX*2)*100);
 document.querySelector(".container").innerHTML=`
 <h1>🎉 Fertig!</h1>
 <h2>${percent>=90?"🏆 Fantastisch!":percent>=70?"🥈 Sehr gut!":"👍 Gut gemacht!"}</h2>
 <h1>${score}/${MAX*2}</h1>
 <p>Fehler: ${mistakes.length}</p>
 ${mistakes.length?'<button class="restart-btn" onclick="startReview()">📚 Fehler wiederholen</button>':''}
 <button class="restart-btn" onclick="location.reload()">Neu starten 🔄</button>`;
}

function startReview(){
 const seen=new Set();
 reviewQuestions=mistakes.filter(x=>{
   const k=x.join("|");
   if(seen.has(k)) return false;
   seen.add(k); return true;
 });
 reviewMode=true;
 current=0;
 mode=2;
 document.querySelector(".container").innerHTML=`
 <h1>📚 Fehlertraining</h1>
 <div class="subtitle">Nur Wörter mit Fehlern</div>
 <div class="progress-text" id="progressText"></div>
 <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
 <div id="word"></div><div id="answers"></div><div id="result"></div>
 <div>Punkte: <span id="score">${score}</span></div>`;
 loadQuestion();
}

function finishReview(){
 document.querySelector(".container").innerHTML=`
 <h1>🏁 Fehlertraining beendet!</h1>
 <p>Alle Fehler wurden wiederholt.</p>
 <button class="restart-btn" onclick="location.reload()">Neu starten 🔄</button>`;
}

loadQuestion();
</script>
</body>
</html>
